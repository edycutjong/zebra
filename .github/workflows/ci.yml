name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  # ── STAGE 1: Frontend Quality (Quality Gate) ──────────────
  frontend-quality:
    name: "Stage 1 · Frontend Quality"
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ${{ github.event_name == 'push' && fromJSON('[22, 24]') || fromJSON('[22]') }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      - name: Format check (Prettier)
        run: npm run format:check
      - name: Lint
        run: npm run lint
      - name: Type check
        run: npm run typecheck
      - name: Unit tests with coverage
        run: npm run test:coverage
      - name: Upload coverage report
        if: matrix.node-version == 22
        uses: actions/upload-artifact@v7
        with:
          name: frontend-coverage
          path: coverage/
          retention-days: 7

  # ── STAGE 1 (Parallel): Smart Contract Quality ────────────
  contract-quality:
    name: "Stage 1 · Soroban Smart Contract"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          target: wasm32-unknown-unknown
      - name: Run Cargo tests
        run: cargo test
        working-directory: contracts/zebra_payroll

  # ── STAGE 1 (Parallel): ZK Circuits Quality ──────────────
  circuit-quality:
    name: "Stage 1 · ZK Circuits"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install Nargo
        run: |
          curl -L https://raw.githubusercontent.com/noir-lang/noirup/main/install | bash
          $HOME/.nargo/bin/noirup -v 1.0.0-beta.9
          echo "$HOME/.nargo/bin" >> $GITHUB_PATH
      - name: Run Nargo Compile & Test (payroll_circuit)
        run: |
          cd payroll_circuit
          nargo compile
          nargo test
      - name: Run Nargo Compile & Test (payroll_circuit_mc)
        run: |
          cd payroll_circuit_mc
          nargo compile
          nargo test

  # ── STAGE 2: Security Gate (parallel with Stage 1) ────────
  secret-scan:
    name: "Stage 2 · Secret Scanning"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: TruffleHog Secret Scan
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --only-verified

  dependency-audit:
    name: "Stage 2 · Dependency Audit"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      - name: npm audit (high + critical)
        run: npm run audit
        continue-on-error: true
      - name: License compliance check
        run: npx license-checker --production --failOn "GPL-3.0;AGPL-3.0" --summary
        continue-on-error: true

  # ── STAGE 3: Build Verification ───────────────────────────
  build:
    name: "Stage 3 · Build Verification"
    needs: [frontend-quality, contract-quality, circuit-quality]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      - name: Next.js production build
        run: npm run build
      - name: Check bundle size
        run: |
          echo "📦 Bundle Size Report"
          echo "─────────────────────"
          if [ -d ".next" ]; then
            TOTAL_SIZE=$(du -sk .next/static | cut -f1)
            echo "Total static assets: ${TOTAL_SIZE}KB"
            if [ "$TOTAL_SIZE" -gt 2000 ]; then
              echo "::error::Bundle size ${TOTAL_SIZE}KB exceeds 2000KB error threshold"
              exit 1
            elif [ "$TOTAL_SIZE" -gt 1500 ]; then
              echo "::warning::Bundle size ${TOTAL_SIZE}KB exceeds 1500KB warning threshold"
            else
              echo "✅ Bundle size within budget"
            fi
          fi

  # ── STAGE 4: E2E Tests ────────────────────────────────────
  e2e:
    name: "Stage 4 · E2E Tests"
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Build application
        run: npm run build
      - name: Run E2E tests
        run: npm run e2e
        env:
          NODE_ENV: production
      - name: Upload E2E artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7

  # ── STAGE 5: Performance ──────────────────────────────────
  performance:
    name: "Stage 5 · Performance"
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      - name: Build application
        run: npm run build
      - name: Lighthouse CI
        run: npm run lighthouse
        continue-on-error: true

  # ── STAGE 6: Release & Deploy (main only) ─────────────────
  deploy:
    name: "Stage 6 · Release & Deploy"
    needs: [build, e2e, performance, secret-scan, dependency-audit, contract-quality, circuit-quality]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      - name: Run version bump
        run: npx tsx scripts/release-bump.ts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
